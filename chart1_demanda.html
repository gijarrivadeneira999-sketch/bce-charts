<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: #ffffff; padding: 24px 28px 20px; }
  .label { font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: #718096; margin-bottom: 4px; }
  .title { font-size: 15px; font-weight: 600; color: #0e1f35; margin-bottom: 2px; }
  .sub { font-size: 12px; color: #a0aec0; margin-bottom: 20px; }
  .legend { display: flex; gap: 16px; margin-bottom: 14px; flex-wrap: wrap; }
  .leg-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #718096; }
  .leg-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
</style>
</head>
<body>
  <div class="label">Componentes de demanda · 2026 (prev.)</div>
  <div class="title">Variación anual por componente</div>
  <div class="sub">Tasas de crecimiento real · Banco Central del Ecuador</div>
  <div class="legend">
    <div class="leg-item"><div class="leg-dot" style="background:#0F6E56"></div>Mayor crecimiento</div>
    <div class="leg-item"><div class="leg-dot" style="background:#5DCAA5"></div>Crecimiento moderado</div>
    <div class="leg-item"><div class="leg-dot" style="background:#9FE1CB"></div>Menor crecimiento</div>
  </div>
  <div style="position:relative;height:260px;">
    <canvas id="c" role="img" aria-label="Variación anual por componente 2026: FBKF 3.3%, Exportaciones 3.2%, PIB 2.5%, Hogares 2.1%, Importaciones 2.1%, Gobierno 1.0%">FBKF 3.3%, Exportaciones 3.2%, PIB 2.5%, Hogares 2.1%, Importaciones 2.1%, Gobierno 1.0%</canvas>
  </div>
<script>
new Chart(document.getElementById('c'), {
  type: 'bar',
  data: {
    labels: ['FBKF','Exportaciones','PIB Total','Hogares','Importaciones','Gobierno'],
    datasets: [{
      data: [3.3, 3.2, 2.5, 2.1, 2.1, 1.0],
      backgroundColor: ['#1D9E75','#1D9E75','#0F6E56','#5DCAA5','#5DCAA5','#9FE1CB'],
      borderRadius: 6, barPercentage: 0.55
    }]
  },
  options: {
    responsive: true, maintainAspectRatio: false,
    plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => ' ' + ctx.parsed.y + '%' } } },
    scales: {
      x: { grid: { color: 'rgba(0,0,0,0.04)' }, ticks: { color: '#718096', font: { size: 12, family: 'DM Sans' }, autoSkip: false } },
      y: { grid: { color: 'rgba(0,0,0,0.04)', borderDash: [4,4] }, ticks: { color: '#718096', font: { size: 11 }, callback: v => v + '%' }, min: 0, max: 4 }
    }
  }
});
</script>
</body>
</html>
